<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Bean Scene Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../frontend/css/style.css">
  </head>
  <body class="page-shell">
    <nav class="navbar navbar-expand-lg sticky-top navbar-glass">
      <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3" href="/">
            <img src="../frontend/images/logo.svg" alt="Bean Scene Cafe logo featuring a stylized coffee bean" class="brand-mark">">
          <span class="brand-wordmark">Bean Scene Cafe</span>
        </a>
        <div class="d-flex flex-wrap align-items-center gap-2 ms-auto">
          <a class="btn btn-outline-coffee" data-table-link="menu.html" href="../frontend/menu.html">Menu</a>
          <a class="btn btn-outline-coffee" data-table-link="order.html" href="../frontend/order.html">Confirm Order</a>
          <span class="table-pill">Table <span data-table-number></span></span>
        </div>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <section class="hero-card reveal">
        <div class="page-hero">
          <div>
            <div class="eyebrow mb-3">Cart</div>
            <h1 class="section-title mb-3">On verifie tout avant d'envoyer la commande en salle.</h1>
            <p class="hero-copy fs-5 mb-0">Modifie les quantites, retire un produit si besoin, puis valide le total pour la table <span data-table-number></span>.</p>
          </div>
          <aside class="page-hero__aside">
            <div class="page-hero__meta">
              <div class="page-hero__meta-item">
                <div class="muted-copy small text-uppercase fw-bold mb-2">Etape suivante</div>
                <div class="section-title fs-2 mb-3">Confirmer</div>
                <a class="btn btn-coffee w-100 py-3" href="../frontend/order.html" data-checkout-link>Passer a la confirmation</a>
              </div>
            </div>
          </aside>
        </div>
      </section>

      <div class="row g-4 mt-2">
        <div class="col-lg-8">
          <section class="surface-card p-4" data-cart-root></section>
        </div>
        <div class="col-lg-4">
          <section data-cart-summary></section>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../frontend/js/cart-page.js"></script>
  </body>
</html>
