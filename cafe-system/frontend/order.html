<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Order | Bean Scene Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/css/style.css">
  </head>
  <body class="page-shell">
    <nav class="navbar navbar-expand-lg sticky-top navbar-glass">
      <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3" href="/">
          <img src="/frontend/images/logo.svg" alt="Bean Scene Cafe logo" class="brand-mark">
          <span class="brand-wordmark">Bean Scene Cafe</span>
        </a>
        <div class="d-flex flex-wrap align-items-center gap-2 ms-auto">
          <a class="btn btn-outline-coffee" data-table-link="menu.html" href="/frontend/menu.html">Menu</a>
          <a class="btn btn-outline-coffee" data-table-link="cart.html" href="/frontend/cart.html">
            Cart <span class="badge text-bg-dark ms-2" data-cart-count>0</span>
          </a>
          <span class="table-pill">Table <span data-table-number></span></span>
        </div>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <section class="hero-card reveal mb-4">
        <div class="page-hero">
          <div>
            <div class="eyebrow mb-3">Final step</div>
            <h1 class="section-title mb-3">La commande est prete a partir vers le serveur.</h1>
            <p class="hero-copy fs-5 mb-0">Au clic, le backend enregistre la commande, calcule le total final et la rend disponible pour le staff.</p>
          </div>
          <aside class="page-hero__aside">
            <div class="page-hero__meta">
              <div class="page-hero__meta-item">
                <div class="muted-copy small text-uppercase fw-bold mb-2">Context</div>
                <div class="fw-semibold">Table <span data-table-number></span> active avec panier encore modifiable tant que la validation n'est pas envoyee.</div>
              </div>
            </div>
          </aside>
        </div>
      </section>

      <div class="row justify-content-center">
        <div class="col-xl-10">
          <div data-order-root></div>
          <div class="d-flex justify-content-center mt-4 checkout-cta">
            <button class="btn btn-coffee btn-lg px-5 py-3" type="button" data-confirm-order>Confirm Order</button>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/frontend/js/order.js"></script>
  </body>
</html>
