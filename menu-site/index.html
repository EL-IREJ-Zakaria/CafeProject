<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero-section text-white">
    <div class="container py-5">
      <div class="row align-items-center g-4">
        <div class="col-lg-7">
          <span class="badge bg-light text-dark px-3 py-2 mb-3">Cafe Menu</span>
          <h1 class="display-5 fw-bold mb-3">Commandez votre cafe en quelques secondes</h1>
          <p class="lead mb-0">
            Choisissez votre table, votre produit, la quantite, puis envoyez votre commande directement au serveur.
          </p>
        </div>
        <div class="col-lg-5">
          <div class="order-box shadow-lg">
            <h2 class="h4 mb-4">Passer une commande</h2>

            <form id="orderForm">
              <div class="mb-3">
                <label for="tableNumber" class="form-label">Numero de table</label>
                <input
                  type="number"
                  id="tableNumber"
                  class="form-control"
                  min="1"
                  placeholder="Ex: 5"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="productSelect" class="form-label">Produit</label>
                <select id="productSelect" class="form-select" required>
                  <option value="">Choisir un produit</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="quantity" class="form-label">Quantite</label>
                <input
                  type="number"
                  id="quantity"
                  class="form-control"
                  min="1"
                  value="1"
                  required
                />
              </div>

              <div class="summary-box mb-3">
                <div class="d-flex justify-content-between">
                  <span>Prix unitaire</span>
                  <strong id="unitPrice">0.00 DH</strong>
                </div>
                <div class="d-flex justify-content-between mt-2">
                  <span>Total</span>
                  <strong id="totalPrice">0.00 DH</strong>
                </div>
              </div>

              <button type="submit" id="submitBtn" class="btn btn-coffee w-100">
                Commander
              </button>
            </form>

            <div id="messageBox" class="alert mt-3 d-none" role="alert"></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="py-5">
    <section class="container">
      <div class="text-center mb-5">
        <h2 class="fw-bold">Notre Menu</h2>
        <p class="text-muted">Selectionnez un produit ci-dessous ou depuis le formulaire.</p>
      </div>

      <div class="row g-4" id="menuContainer"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
